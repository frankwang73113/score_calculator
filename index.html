<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>段考加權成績與平均計算器</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 650px;
        }
        h2 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #4f46e5;
            color: white;
            font-weight: 600;
        }
        input[type="text"], input[type="number"] {
            width: 90%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: #4f46e5;
            outline: none;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-add {
            background-color: #10b981;
            color: white;
        }
        .btn-add:hover {
            background-color: #059669;
        }
        .btn-delete {
            background-color: #ef4444;
            color: white;
            padding: 6px 12px;
        }
        .btn-delete:hover {
            background-color: #dc2626;
        }
        .actions {
            margin-bottom: 25px;
            display: flex;
            justify-content: flex-start;
        }
        .results-box {
            background-color: #eef2ff;
            border-left: 5px solid #4f46e5;
            padding: 20px;
            border-radius: 0 8px 8px 0;
        }
        .results-box p {
            margin: 10px 0;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
        }
        .results-box span {
            font-weight: bold;
            font-size: 18px;
            color: #4f46e5;
        }
        .highlight {
            font-size: 22px !important;
            color: #10b981 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>段考加權成績計算器</h2>
    
    <div class="actions">
        <button class="btn btn-add" onclick="addRow()">＋ 新增科目</button>
    </div>

    <table id="scoreTable">
        <thead>
            <tr>
                <th style="width: 35%;">科目名稱</th>
                <th style="width: 25%;">學分數 (權重)</th>
                <th style="width: 25%;">分數</th>
                <th style="width: 15%;">操作</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div class="results-box">
        <p>總學分數：<span id="totalCredits">0</span></p>
        <p>總加權得分 (分數 × 學分 的總和)：<span id="totalWeightedScore">0</span></p>
        <p style="border-top: 1px dashed #cbd5e1; padding-top: 10px; margin-top: 15px;">
            <strong>加權平均成績：</strong><span id="weightedAverage" class="highlight">0.00</span>
        </p>
    </div>
</div>

<script>
    // 網頁載入時，預設新增三個空白科目
    window.onload = function() {
        addRow('國文', 3, '');
        addRow('英文', 3, '');
        addRow('數學', 4, '');
    };

    // 新增一列科目的函式
    function addRow(name = '', credit = '', score = '') {
        const tbody = document.querySelector('#scoreTable tbody');
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
            <td><input type="text" class="subject-name" value="${name}" placeholder="例：物理"></td>
            <td><input type="number" class="credit" value="${credit}" min="0" step="0.5" placeholder="學分" oninput="calculate()"></td>
            <td><input type="number" class="score" value="${score}" min="0" max="100" placeholder="分數" oninput="calculate()"></td>
            <td><button class="btn btn-delete" onclick="deleteRow(this)">刪除</button></td>
        `;
        
        tbody.appendChild(tr);
        calculate(); // 新增後重新計算
    }

    // 刪除該列科目的函式
    function deleteRow(button) {
        button.parentElement.parentElement.remove();
        calculate(); // 刪除後重新計算
    }

    // 計算加權與平均的核心邏輯
    function calculate() {
        const rows = document.querySelectorAll('#scoreTable tbody tr');
        let totalCredits = 0;
        let totalWeightedScore = 0;

        rows.forEach(row => {
            const creditInput = row.querySelector('.credit').value;
            const scoreInput = row.querySelector('.score').value;

            // 轉換為數字，若欄位為空或非數字則忽略（不計入總學分與總分）
            if (creditInput !== '' && scoreInput !== '') {
                const credit = parseFloat(creditInput);
                const score = parseFloat(scoreInput);

                if (!isNaN(credit) && !isNaN(score)) {
                    totalCredits += credit;
                    totalWeightedScore += (score * credit);
                }
            }
        });

        // 計算加權平均（防呆：總學分為 0 時不進行除法）
        const weightedAverage = totalCredits > 0 ? (totalWeightedScore / totalCredits) : 0;

        // 更新畫面顯示（平均分數四捨五入至小數點後兩位）
        document.getElementById('totalCredits').innerText = totalCredits;
        document.getElementById('totalWeightedScore').innerText = totalWeightedScore.toFixed(1);
        document.getElementById('weightedAverage').innerText = weightedAverage.toFixed(2);
    }
</script>

</body>
</html>
